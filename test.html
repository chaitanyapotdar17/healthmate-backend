<!DOCTYPE html>
<html>
<head>
    <title>HealthMate API Test</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        button { background: #2196F3; color: white; padding: 10px 20px; border: none; cursor: pointer; margin: 5px; }
        #result { margin-top: 20px; padding: 10px; background: #f0f0f0; }
    </style>
</head>
<body>
    <h1>HealthMate Image Analysis Test</h1>
    
    <h2>Test X-Ray Analysis</h2>
    <input type="file" id="xrayFile" accept="image/*">
    <button onclick="analyzeXray()">Analyze X-Ray</button>
    
    <h2>Test Skin Analysis</h2>
    <input type="file" id="skinFile" accept="image/*">
    <button onclick="analyzeSkin()">Analyze Skin</button>
    
    <h2>Result:</h2>
    <div id="result">No result yet</div>

    <script>
        const BASE_URL = 'https://healthmate-backend-dp3g.onrender.com';

        function analyzeXray() {
            const file = document.getElementById('xrayFile').files[0];
            if (!file) { alert('Please select an image first!'); return; }
            
            document.getElementById('result').innerText = 'Analyzing...';
            
            const formData = new FormData();
            formData.append('image', file);
            
            fetch(BASE_URL + '/analyze-xray', {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                document.getElementById('result').innerText = 
                    'Result: ' + JSON.stringify(data);
            })
            .catch(err => {
                document.getElementById('result').innerText = 'Error: ' + err;
            });
        }

        function analyzeSkin() {
            const file = document.getElementById('skinFile').files[0];
            if (!file) { alert('Please select an image first!'); return; }
            
            document.getElementById('result').innerText = 'Analyzing...';
            
            const formData = new FormData();
            formData.append('image', file);
            
            fetch(BASE_URL + '/analyze-skin', {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                document.getElementById('result').innerText = 
                    'Result: ' + JSON.stringify(data);
            })
            .catch(err => {
                document.getElementById('result').innerText = 'Error: ' + err;
            });
        }
    </script>
</body>
</html>
